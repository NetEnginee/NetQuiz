services:
  ether1-nginx:
    image: nginx:alpine
    container_name: ether1-nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/webfeed/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - cpu-php-fpm
    networks:
      - mikrotik-localnet

  cpu-php-fpm:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: cpu-php-fpm
    volumes:
      - ./src:/var/webfeed/html
    networks:
      - mikrotik-localnet

  nvram-mysql:
    image: mysql:8.4
    container_name: nvram-mysql
    restart: always
    environment:
      MYSQL_DATABASE: db_mikrotik_quiz
      MYSQL_ROOT_PASSWORD: password_admin_router
      MYSQL_USER: operator_winbox
      MYSQL_PASSWORD: password_winbox
    ports:
      - "3306:3306"
    volumes:
      - nvram-data:/var/lib/mysql
    networks:
      - mikrotik-localnet

networks:
  mikrotik-localnet:
    driver: bridge

volumes:
  nvram-data:
    driver: local
